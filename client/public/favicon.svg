<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="100" fill="url(#grad1)" />
  
  <g fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Grid -->
    <line x1="170" y1="100" x2="170" y2="412" />
    <line x1="342" y1="100" x2="342" y2="412" />
    <line x1="100" y1="170" x2="412" y2="170" />
    <line x1="100" y1="342" x2="412" y2="342" />
    
    <!-- X mark -->
    <path d="M120 120 L220 220 M220 120 L120 220" stroke="#4facfe" stroke-width="35" transform="translate(20, 20)" />
    
    <!-- O mark -->
    <circle cx="380" cy="380" r="50" stroke="#ff0099" stroke-width="35" />
  </g>
</svg>
